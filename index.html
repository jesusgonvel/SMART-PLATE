<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART PLATE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 40px;
        }
        h1 { color: #FFD700; font-size: 4em; margin-bottom: 5px; }
        .descripcion { color: #00FF7F; font-size: 1.8em; margin-bottom: 40px; font-style: italic; }
        .panel { background: #333; padding: 30px; border-radius: 20px; display: inline-block; margin-bottom: 40px; }
        select { padding: 15px; font-size: 18px; border-radius: 10px; margin-right: 15px; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; background-color: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #imagen-proyectada { max-width: 95%; max-height: 65vh; border-radius: 20px; display: none; margin-top: 20px; border: 5px solid #333; }
    </style>
</head>
<body>

    <h1>SMART PLATE</h1>
    <p class="descripcion">For healthier kids</p>

    <div class="panel">
        <label for="edad">Selecciona Edad: </label>
        <select id="edad">
            <option value="comida rango 2 a 4.png">2 a 4 años</option>
            <option value="rango 5-8.jpeg">5 a 8 años</option>
            <option value="rango mayores.png">9 a 12 años</option>
        </select>
        <button onclick="proyectar()">Proyectar</button>
    </div>

    <div id="contenedor-imagen">
        <img id="imagen-proyectada" src="" alt="Menú">
    </div>

    <script>
        function proyectar() {
            const select = document.getElementById("edad");
            const imagen = document.getElementById("imagen-proyectada");
            
            // encodeURI es vital porque tus archivos tienen espacios
            imagen.src = encodeURI(select.value);
            
            imagen.style.display = "inline-block";
            imagen.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
